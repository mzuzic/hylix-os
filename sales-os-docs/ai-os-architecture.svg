<svg viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hylix AI OS architecture">
  <title>Hylix AI OS — partner architecture</title>
  <desc>Client environment (team, Claude apps with Hylix plugin, existing tools) connects via MCP to the multi-tenant Hylix AI OS server hosting the Second Brain, SOP registry, and routines.</desc>
  <style>
    .th { font: 600 14px 'Helvetica Neue', Arial, sans-serif; fill: #1f2937; }
    .ts { font: 400 12px 'Helvetica Neue', Arial, sans-serif; fill: #6b7280; }
    .box { fill: none; stroke: #d1d5db; }
    .arr { stroke: #6b7280; stroke-width: 1.5; fill: none; }
    .blue rect { fill: #dbeafe; stroke: #3b82f6; }
    .purple rect { fill: #ede9fe; stroke: #8b5cf6; }
    .gray rect { fill: #f3f4f6; stroke: #9ca3af; }
    .sw-blue { fill: #dbeafe; stroke: #3b82f6; }
    .sw-purple { fill: #ede9fe; stroke: #8b5cf6; }
    .sw-gray { fill: #f3f4f6; stroke: #9ca3af; }
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect class="box" x="20" y="30" width="390" height="360" rx="8" stroke-width="0.5"/>
  <text class="th" x="40" y="56">CLIENT ENVIRONMENT</text>
  <text class="ts" x="40" y="76">per client · their accounts &amp; data</text>

  <g class="blue">
    <rect x="115" y="100" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="118" text-anchor="middle" dominant-baseline="central">Team</text>
    <text class="ts" x="215" y="136" text-anchor="middle" dominant-baseline="central">phone · desktop · voice</text>
  </g>
  <line x1="215" y1="156" x2="215" y2="196" class="arr" marker-end="url(#arrow)"/>
  <g class="blue">
    <rect x="115" y="196" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="214" text-anchor="middle" dominant-baseline="central">Claude apps</text>
    <text class="ts" x="215" y="232" text-anchor="middle" dominant-baseline="central">with Hylix plugin skills</text>
  </g>
  <line x1="215" y1="252" x2="215" y2="292" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="ts" x="232" y="272" dominant-baseline="central">MCP · client OAuth</text>
  <g class="gray">
    <rect x="115" y="292" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="310" text-anchor="middle" dominant-baseline="central">Existing tools</text>
    <text class="ts" x="215" y="328" text-anchor="middle" dominant-baseline="central">HubSpot · Gmail · QuickBooks</text>
  </g>

  <rect class="box" x="430" y="30" width="230" height="360" rx="8" stroke-width="0.5"/>
  <text class="th" x="450" y="56">HYLIX AI OS SERVER</text>
  <text class="ts" x="450" y="76">multi-tenant · MCP/HTTPS</text>

  <g class="purple">
    <rect x="445" y="95" width="200" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="545" y="113" text-anchor="middle" dominant-baseline="central">Second Brain</text>
    <text class="ts" x="545" y="135" text-anchor="middle" dominant-baseline="central">company · sales · finance</text>
    <text class="ts" x="545" y="153" text-anchor="middle" dominant-baseline="central">marketing · ops · people</text>
    <text class="ts" x="545" y="175" text-anchor="middle" dominant-baseline="central">profile → state → events → library</text>
  </g>
  <g class="purple">
    <rect x="445" y="220" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="545" y="238" text-anchor="middle" dominant-baseline="central">SOP registry</text>
    <text class="ts" x="545" y="256" text-anchor="middle" dominant-baseline="central">playbooks per module</text>
  </g>
  <g class="purple">
    <rect x="445" y="300" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="545" y="318" text-anchor="middle" dominant-baseline="central">Routines &amp; agents</text>
    <text class="ts" x="545" y="336" text-anchor="middle" dominant-baseline="central">distill · cron · Claude API</text>
  </g>

  <text class="ts" x="372" y="208" text-anchor="middle">MCP + tenant token</text>
  <line x1="315" y1="224" x2="430" y2="224" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <line x1="545" y1="420" x2="545" y2="394" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="545" y="438" text-anchor="middle">webhooks: transcripts · reviews</text>

  <rect class="sw-blue" x="20" y="452" width="12" height="12" rx="3" stroke-width="0.5"/>
  <text class="ts" x="38" y="458" dominant-baseline="central">client-side</text>
  <rect class="sw-purple" x="130" y="452" width="12" height="12" rx="3" stroke-width="0.5"/>
  <text class="ts" x="148" y="458" dominant-baseline="central">Hylix-hosted</text>
  <rect class="sw-gray" x="252" y="452" width="12" height="12" rx="3" stroke-width="0.5"/>
  <text class="ts" x="270" y="458" dominant-baseline="central">third-party tools</text>
</svg>
